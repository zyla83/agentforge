<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="AgentForge example-tools">
  <rect width="128" height="128" rx="24" fill="#10131A"/>
  <svg x="4" y="4" width="120" height="120" viewBox="55 45 402 422">
  <defs>
    <linearGradient id="blue" x1=".2" y1="0" x2=".8" y2="1"><stop stop-color="#527AFF"/><stop offset="1" stop-color="#2D47BE"/></linearGradient>
    <linearGradient id="graphite" x1=".2" y1="0" x2=".8" y2="1"><stop stop-color="#4B525E"/><stop offset="1" stop-color="#2A2E36"/></linearGradient>
    <linearGradient id="cyan" x1=".2" y1="0" x2=".8" y2="1"><stop stop-color="#23D2F1"/><stop offset="1" stop-color="#008FC0"/></linearGradient>
    <filter id="edge-glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="1.4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <path id="module-half" d="M253.5 73v43.5l-32.5 21v26l31.5-19v57.5l-66 42-33-20 27-18.5v-87z"/>
    <g id="module">
      <use href="#module-half"/>
      <use href="#module-half" transform="translate(512 0) scale(-1 1)"/>
    </g>
  </defs>
  <g transform="translate(25.6 25.6) scale(.9)">
    <g stroke="#10131A" stroke-width="5" stroke-linejoin="round">
      <use href="#module" fill="url(#blue)" transform="translate(0 -28)"/>
      <use href="#module" fill="url(#cyan)" transform="rotate(120 256 256) translate(0 -28)"/>
      <use href="#module" fill="url(#graphite)" transform="rotate(240 256 256) translate(0 -28)"/>
    </g>
    <g fill="none" stroke="#C66A18" stroke-width="2" stroke-linecap="round" filter="url(#edge-glow)">
    <!-- north-east, east and west inner edges only -->
      <path d="M259.5 202 325.5 244" transform="translate(0 -28)"/>
      <path d="M252.5 202 186.5 244" transform="rotate(120 256 256) translate(0 -28)"/>
      <path d="M259.5 202 325.5 244" transform="rotate(240 256 256) translate(0 -28)"/>
    </g>
  </g>
  <path fill="#FF9D24" stroke="#10131A" stroke-width="1.5" stroke-linejoin="round" d="M256 210C260 232 268 248 302 256c-34 8-42 24-46 46-4-22-12-38-46-46 34-8 42-24 46-46Z"/>
</svg>
